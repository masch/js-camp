info:
  name: Get Jobs
  type: http
  seq: 2

http:
  method: GET
  url: "{{DOMAIN}}/jobs?offset=0&limit=4"
  headers:
    - name: Origin
      value: http://localhost:5173
  params:
    - name: offset
      value: "0"
      type: query
    - name: limit
      value: "4"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
